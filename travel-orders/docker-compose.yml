services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel_orders_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=travel_orders
      - DB_USERNAME=travel_user
      - DB_PASSWORD=travel_pass
      - JWT_SECRET=${JWT_SECRET}
      - CACHE_STORE=array
      - SESSION_DRIVER=array
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www

  db:
    image: mysql:8.0
    container_name: travel_orders_db
    restart: always
    environment:
      MYSQL_DATABASE: travel_orders
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: travel_user
      MYSQL_PASSWORD: travel_pass
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

volumes:
  db_data:
